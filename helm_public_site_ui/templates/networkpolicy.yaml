apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-{{ .Values.global.publicsiteui.appName }}
  namespace: {{ .Release.Namespace }}
spec:
  podSelector:
    matchLabels:
      name: {{ .Values.global.publicsiteui.appName }}-svc
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-internal
      - podSelector:
          matchLabels:
            name: ingress
      ports:
      - protocol: TCP
        port: 10443
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-external
      - podSelector:
          matchLabels:
            name: ingress
      ports:
      - protocol: TCP
        port: 10443
